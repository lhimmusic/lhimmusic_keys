<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lhim Keys</title>
<link rel="icon" href="favicon.ico">
<style>
:root{--bg:#ffffff;--text:#121826;--active:#fbbf24}
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text)}
.app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow:hidden;touch-action:none}
.midi-notice{display:none;width:100%;background:#fef3c7;border-bottom:1px solid #f59e0b;color:#92400e;font:500 11px/1.4 system-ui,sans-serif;text-align:center;padding:7px 16px;position:relative;box-sizing:border-box}
.midi-notice.visible{display:block}
.midi-notice-close{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#92400e;font:700 14px/1 system-ui,sans-serif;cursor:pointer;padding:2px 6px;outline:none}

.toggle-button{position:absolute;z-index:10;appearance:none;display:flex;align-items:center;gap:8px;border:none;background:none;color:#1e293b;padding:4px 0;font:700 11px/1 system-ui,sans-serif;letter-spacing:0.04em;cursor:pointer;user-select:none;outline:none}
.keyshape-button{right:18px;bottom:calc(100% + 10px)}
.sustain-button{right:18px;bottom:calc(100% + 34px)}
.sound-button{right:18px;bottom:calc(100% + 58px)}
.piano-wrap.controls-below .sound-pick-wrap{bottom:auto;top:calc(100% + 10px)}
.piano-wrap.controls-below .sound-button{bottom:auto;top:calc(100% + 34px)}
.piano-wrap.controls-below .sustain-button{bottom:auto;top:calc(100% + 58px)}
.piano-wrap.controls-below .keyshape-button{bottom:auto;top:calc(100% + 82px)}
.toggle-label{white-space:nowrap;color:#94a3b8;display:inline-block;width:110px;text-align:right;margin-right:8px}
.toggle-button.active .toggle-label{color:#1e293b}
.toggle-switch{position:relative;width:26px;height:14px;flex:0 0 auto;border-radius:999px;background:#cbd5e1;transition:background .12s ease}
.toggle-switch::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.25);transition:transform .12s ease}
.toggle-button.active .toggle-switch{background:#1e293b}
.toggle-button.active .toggle-switch::after{transform:translateX(12px)}

.sound-pick-wrap{position:absolute;right:18px;bottom:calc(100% + 82px);z-index:20}
.sound-pick-btn{appearance:none;border:none;background:none;padding:4px 0;font:700 11px/1 system-ui,sans-serif;letter-spacing:0.04em;cursor:pointer;color:#1e293b;display:flex;align-items:center;gap:8px;user-select:none}
.sound-pick-name{white-space:nowrap;color:#94a3b8;display:inline-block;width:88px;text-align:right;margin-right:8px}
.sound-pick-arr{width:26px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:14px;color:#cbd5e1;letter-spacing:1px;line-height:1}

.sound-panel{position:fixed;width:110px;background:#fff;border:1px solid #1e293b;display:none;z-index:30}
.sound-panel.open{display:block}
.s-row{display:block;width:100%;background:none;border:none;cursor:pointer;font:700 11px/1 system-ui;letter-spacing:0.04em;color:#64748b;padding:7px 10px 7px 22px;text-align:left}
.s-row:hover{background:#f8fafc}
.s-row.sel{background:#fffbeb;color:#1e293b}

.piano-wrap{position:relative;width:calc(var(--pw-scale,1)*100%);transform:translateX(var(--pw-tx,0px));background:#fff;margin-top:var(--pw-top,max(112px,calc(50vh - 56px - 4.04vw - 30px)))}
.piano{position:relative;width:100%;aspect-ratio:52/4.2;overflow:hidden;background:#fff}
.piano.tall{aspect-ratio:52/5.5}
.piano::before{content:"";position:absolute;inset:0 0 auto 0;height:1px;background:#1e293b;z-index:5;pointer-events:none}
.white,.black{position:absolute;user-select:none;touch-action:none;transition:background .06s ease}
.white{background:#fff;border-top:1px solid #1e293b;border-right:1px solid #1e293b;border-bottom:1px solid #1e293b;height:100%}
.white.first-white{border-left:1px solid #1e293b}
.black{z-index:2;background:#1e293b;border:1px solid #1e293b;border-top:none;height:62%}
.piano.tall .black{height:65%}
.white.active,.black.active{background:var(--active)!important}

.help-btn{position:absolute;right:18px;bottom:calc(100% + 106px);z-index:10;appearance:none;border:none;background:none;color:#cbd5e1;width:22px;height:22px;font:700 14px/1 system-ui;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:color .12s;outline:none}
.help-btn:hover{color:#1e293b}
.piano-wrap.controls-below .help-btn{bottom:auto;top:calc(100% + 106px)}
.help-panel{position:fixed;z-index:40;background:#fff;border:1px solid #1e293b;padding:14px 16px;display:none;min-width:190px;max-height:calc(100vh - 8px);overflow-y:auto}
.help-panel.open{display:block}
.help-row{display:flex;gap:10px;margin-bottom:6px;align-items:baseline}
.help-row:last-child{margin-bottom:0}
.help-key{font:700 11px/1 system-ui;letter-spacing:0.04em;color:#1e293b;white-space:nowrap;min-width:72px}
.help-desc{font:400 11px/1.5 system-ui;color:#94a3b8}
</style>
</head>
<body>
<div class="app">
  <div class="midi-notice" id="midiNotice">이 브라우저는 MIDI를 지원하지 않습니다. MIDI 기기를 연결하려면 Chrome을 사용해 주세요.</div>
  <div class="midi-notice" id="midiWinNotice">윈도우는 MIDI 입력을 한 프로그램에서만 지원합니다. 큐베이스 등 DAW에서 사용 중이면 입력이 안 될 수 있습니다. 동시 사용은 loopMIDI 같은 가상 포트로 가능합니다.<button class="midi-notice-close" id="midiWinNoticeClose" type="button" aria-label="닫기">×</button></div>
  <div class="piano-wrap">
    <div class="sound-pick-wrap">
      <button class="sound-pick-btn" id="soundPickBtn" type="button">
        <span class="sound-pick-name" id="soundPickName">PIANO</span>
        <span class="sound-pick-arr">···</span>
      </button>
      <div class="sound-panel" id="soundPanel"></div>
    </div>
    <button class="toggle-button keyshape-button" id="keyShapeButton" type="button" aria-pressed="false">
      <span class="toggle-label">KEY SHAPE</span><span class="toggle-switch" aria-hidden="true"></span>
    </button>
    <button class="toggle-button sound-button" id="soundButton" type="button" aria-pressed="false">
      <span class="toggle-label">SOUND</span><span class="toggle-switch" aria-hidden="true"></span>
    </button>
    <button class="toggle-button sustain-button" id="sustainButton" type="button" aria-pressed="false">
      <span class="toggle-label">SUSTAIN</span><span class="toggle-switch" aria-hidden="true"></span>
    </button>
    <button class="help-btn" id="helpBtn" type="button" aria-label="도움말">?</button>
    <div class="piano" id="piano"></div>
  </div>
  <div class="help-panel" id="helpPanel">
    <div class="help-row"><span class="help-key">PIANO</span><span class="help-desc">악기 선택</span></div>
    <div class="help-row"><span class="help-key">SOUND</span><span class="help-desc">소리 ON / OFF</span></div>
    <div class="help-row"><span class="help-key">SUSTAIN</span><span class="help-desc">건반 색 유지</span></div>
    <div class="help-row"><span class="help-key">KEY SHAPE</span><span class="help-desc">건반 길이 전환</span></div>
    <div class="help-row"><span class="help-key">휠 스크롤</span><span class="help-desc">건반 위치 이동</span></div>
    <div class="help-row"><span class="help-key">Shift + 휠</span><span class="help-desc">커서 기준 확대·축소</span></div>
    <div class="help-row"><span class="help-key">모바일</span><span class="help-desc">스와이프 · 핀치로 이동·확대</span></div>
  </div>
</div>
<script>
const MMIN=21,MMAX=108;
const IS_BLACK=[0,1,0,1,0,0,1,0,1,0,1,0].map(Boolean);
const BLACK_TRANSLATE={1:-67,3:-33,6:-72,8:-50,10:-28};
const piano=document.getElementById('piano');
const sustainButton=document.getElementById('sustainButton');
const keyShapeButton=document.getElementById('keyShapeButton');
const soundButton=document.getElementById('soundButton');
const soundPickBtn=document.getElementById('soundPickBtn');
const soundPickName=document.getElementById('soundPickName');
const soundPanel=document.getElementById('soundPanel');

let keyEls={},clickHeld=new Set(),midiHeld=new Set(),midiSustained=new Set(),pedalSustained=new Set();
let pedalDown=false,sustainEnabled=false,midiInitStarted=false;
let soundEnabled=false,audioCtx=null,currentSoundId='piano',masterNode=null;
const activeNodes={};

function getCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
let audioUnlocked=false;
function unlockAudio(){
  const ctx=getCtx();
  if(ctx.state==='running')return;
  ctx.resume().then(function(){
    try{
      const buf=ctx.createBuffer(1,1,22050);
      const src=ctx.createBufferSource();
      src.buffer=buf;src.connect(ctx.destination);src.start(0);
    }catch(ex){}
  });
}
['touchstart','touchend','pointerdown','click'].forEach(ev=>
  document.addEventListener(ev,unlockAudio,{passive:true,capture:true})
);

function getMaster(ctx){
  if(!masterNode){
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-18;comp.knee.value=20;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.15;
    const g=ctx.createGain();g.gain.value=0.5;
    comp.connect(g);g.connect(ctx.destination);
    masterNode=comp;
  }
  return masterNode;
}
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}

function mkPiano(ctx,freq,t){
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const oscs=[];
  [[0,'triangle'],[-4,'sine'],[4,'sine']].forEach(([d,tp])=>{
    const o=ctx.createOscillator();o.type=tp;o.frequency.value=freq;o.detune.value=d;
    o.connect(g);o.start(t);oscs.push(o);
  });
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.22,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.1,t+0.15);g.gain.exponentialRampToValueAtTime(0.0001,t+3.5);
  const tid=setTimeout(()=>oscs.forEach(o=>{try{o.stop()}catch(e){}}),3700);
  return()=>{clearTimeout(tid);const n=ctx.currentTime;g.gain.cancelScheduledValues(n);g.gain.setValueAtTime(Math.max(0.00001,g.gain.value),n);g.gain.exponentialRampToValueAtTime(0.0001,n+0.15);setTimeout(()=>oscs.forEach(o=>{try{o.stop()}catch(e){}}),200);};
}

function mkEPiano(ctx,freq,t){
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const mod=ctx.createOscillator();mod.frequency.value=freq*2;
  const modG=ctx.createGain();modG.gain.value=freq*0.7;
  mod.connect(modG);mod.start(t);
  const car=ctx.createOscillator();car.type='sine';car.frequency.value=freq;
  modG.connect(car.frequency);car.connect(g);car.start(t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.28,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.15,t+0.4);g.gain.exponentialRampToValueAtTime(0.0001,t+4.5);
  const all=[mod,car];
  const tid=setTimeout(()=>all.forEach(o=>{try{o.stop()}catch(e){}}),4700);
  return()=>{clearTimeout(tid);const n=ctx.currentTime;g.gain.cancelScheduledValues(n);g.gain.setValueAtTime(Math.max(0.00001,g.gain.value),n);g.gain.exponentialRampToValueAtTime(0.0001,n+0.3);setTimeout(()=>all.forEach(o=>{try{o.stop()}catch(e){}}),400);};
}

function mkStrings(ctx,freq,t){
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=1000;f.Q.value=0.4;f.connect(g);
  const oscs=[];
  [0,-5,5,-10,10].forEach(d=>{
    const o=ctx.createOscillator();o.type='triangle';o.frequency.value=freq;o.detune.value=d;
    o.connect(f);o.start(t);oscs.push(o);
  });
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.6);
  return()=>{const n=ctx.currentTime;g.gain.cancelScheduledValues(n);g.gain.setValueAtTime(Math.max(0.00001,g.gain.value),n);g.gain.exponentialRampToValueAtTime(0.0001,n+0.7);setTimeout(()=>oscs.forEach(o=>{try{o.stop()}catch(e){}}),900);};
}

function mkOrgan(ctx,freq,t){
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const oscs=[];
  [[1,0.4],[2,0.3],[3,0.15],[4,0.1],[6,0.05]].forEach(([r,a])=>{
    const og=ctx.createGain();og.gain.value=a;og.connect(g);
    const o=ctx.createOscillator();o.type='sine';o.frequency.value=freq*r;
    o.connect(og);o.start(t);oscs.push(o);
  });
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.32,t+0.012);
  return()=>{const n=ctx.currentTime;g.gain.cancelScheduledValues(n);g.gain.setValueAtTime(Math.max(0.00001,g.gain.value),n);g.gain.linearRampToValueAtTime(0,n+0.02);setTimeout(()=>oscs.forEach(o=>{try{o.stop()}catch(e){}}),80);};
}

function mkLead(ctx,freq,t){
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const f=ctx.createBiquadFilter();f.type='lowpass';f.connect(g);
  f.frequency.setValueAtTime(freq*10,t);f.frequency.exponentialRampToValueAtTime(freq*2,t+0.25);
  const oscs=[];
  [0,-7,7].forEach(d=>{
    const o=ctx.createOscillator();o.type='sawtooth';o.frequency.value=freq;o.detune.value=d;
    o.connect(f);o.start(t);oscs.push(o);
  });
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+2.2);
  const tid=setTimeout(()=>oscs.forEach(o=>{try{o.stop()}catch(e){}}),2400);
  return()=>{clearTimeout(tid);const n=ctx.currentTime;g.gain.cancelScheduledValues(n);g.gain.setValueAtTime(Math.max(0.00001,g.gain.value),n);g.gain.exponentialRampToValueAtTime(0.0001,n+0.08);setTimeout(()=>oscs.forEach(o=>{try{o.stop()}catch(e){}}),150);};
}

function mkBass(ctx,freq,t){
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const f=ctx.createBiquadFilter();f.type='lowpass';f.connect(g);
  f.frequency.setValueAtTime(freq*8,t);f.frequency.exponentialRampToValueAtTime(400,t+0.08);
  const o=ctx.createOscillator();o.type='square';o.frequency.value=freq;o.connect(f);o.start(t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.38,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001,t+1.5);
  const tid=setTimeout(()=>{try{o.stop()}catch(e){}},1700);
  return()=>{clearTimeout(tid);const n=ctx.currentTime;g.gain.cancelScheduledValues(n);g.gain.setValueAtTime(Math.max(0.00001,g.gain.value),n);g.gain.exponentialRampToValueAtTime(0.0001,n+0.06);setTimeout(()=>{try{o.stop()}catch(e){}},130);};
}

function mkFlute(ctx,freq,t){
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const o=ctx.createOscillator();o.type='sine';o.frequency.value=freq;o.connect(g);o.start(t);
  const nBuf=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);
  const nd=nBuf.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nBuf;ns.loop=true;
  const nf=ctx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=freq*1.5;nf.Q.value=3;
  const ng=ctx.createGain();ng.gain.value=0.025;
  ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.08);
  const all=[o,ns];
  return()=>{const n=ctx.currentTime;g.gain.cancelScheduledValues(n);g.gain.setValueAtTime(Math.max(0.00001,g.gain.value),n);g.gain.exponentialRampToValueAtTime(0.0001,n+0.12);setTimeout(()=>all.forEach(x=>{try{x.stop()}catch(e){}}),250);};
}

function noiseBuffer(ctx,dur){
  const b=ctx.createBuffer(1,Math.floor(ctx.sampleRate*dur),ctx.sampleRate);
  const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  return b;
}
function mkDrums(ctx,freq,t,m){
  m=m-12;
  const g=ctx.createGain();g.connect(getMaster(ctx));
  const noop=()=>{};
  if(m===35||m===36){
    const o=ctx.createOscillator();o.type='sine';o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(40,t+0.07);
    o.connect(g);o.start(t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.9,t+0.003);g.gain.exponentialRampToValueAtTime(0.0001,t+0.45);
    setTimeout(()=>{try{o.stop()}catch(e){}},550);return noop;
  }
  if(m===38||m===40){
    const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,0.25);
    const nf=ctx.createBiquadFilter();nf.type='highpass';nf.frequency.value=1200;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.55,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
    const o=ctx.createOscillator();o.type='triangle';o.frequency.value=190;
    const og=ctx.createGain();og.gain.setValueAtTime(0.35,t);og.gain.exponentialRampToValueAtTime(0.0001,t+0.055);
    o.connect(og);og.connect(g);o.start(t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(1,t+0.002);
    setTimeout(()=>{[ns,o].forEach(x=>{try{x.stop()}catch(e){}})},350);return noop;
  }
  if(m===37){
    const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,0.04);
    const nf=ctx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=1800;nf.Q.value=3;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.5,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
    ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
    g.gain.setValueAtTime(1,t);setTimeout(()=>{try{ns.stop()}catch(e){}},80);return noop;
  }
  if(m===39){
    [0,0.008,0.016].forEach(delay=>{
      const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,0.06);
      const nf=ctx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=1100;nf.Q.value=1.5;
      const ng=ctx.createGain();ng.gain.setValueAtTime(0.45,t+delay);ng.gain.exponentialRampToValueAtTime(0.0001,t+delay+0.08);
      ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t+delay);
      setTimeout(()=>{try{ns.stop()}catch(e){}},200);
    });
    g.gain.setValueAtTime(1,t);return noop;
  }
  if(m===42||m===44){
    const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,0.06);
    const nf=ctx.createBiquadFilter();nf.type='highpass';nf.frequency.value=8000;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.28,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
    g.gain.setValueAtTime(1,t);setTimeout(()=>{try{ns.stop()}catch(e){}},120);return noop;
  }
  if(m===46){
    const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,1);
    const nf=ctx.createBiquadFilter();nf.type='highpass';nf.frequency.value=7000;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.32,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
    g.gain.setValueAtTime(1,t);setTimeout(()=>{try{ns.stop()}catch(e){}},700);return noop;
  }
  if(m===49||m===57||m===55){
    const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,2);
    const nf=ctx.createBiquadFilter();nf.type='highpass';nf.frequency.value=5000;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.42,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+1.6);
    ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
    g.gain.setValueAtTime(1,t);setTimeout(()=>{try{ns.stop()}catch(e){}},2100);return noop;
  }
  if(m===51||m===53||m===59){
    const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,1);
    const nf=ctx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=5500;nf.Q.value=0.8;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.25,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.9);
    ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
    const o=ctx.createOscillator();o.type='sine';o.frequency.value=2800;
    const og=ctx.createGain();og.gain.setValueAtTime(0.08,t);og.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
    o.connect(og);og.connect(g);o.start(t);
    g.gain.setValueAtTime(1,t);
    setTimeout(()=>{[ns,o].forEach(x=>{try{x.stop()}catch(e){}})},1100);return noop;
  }
  if([41,43,45,47,48,50].includes(m)){
    const pitches={41:70,43:90,45:110,47:130,48:155,50:180};
    const p=pitches[m]||100;
    const o=ctx.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(p*1.6,t);o.frequency.exponentialRampToValueAtTime(p,t+0.08);
    o.connect(g);o.start(t);
    const ns=ctx.createBufferSource();ns.buffer=noiseBuffer(ctx,0.04);
    const nf=ctx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=p*2;nf.Q.value=2;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.15,t);ng.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
    ns.connect(nf);nf.connect(ng);ng.connect(g);ns.start(t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.65,t+0.003);g.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
    setTimeout(()=>{[o,ns].forEach(x=>{try{x.stop()}catch(e){}})},450);return noop;
  }
  if(m===56){
    const oscs=[];
    [540,800].forEach(f=>{
      const o=ctx.createOscillator();o.type='square';o.frequency.value=f;o.connect(g);o.start(t);oscs.push(o);
    });
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.003);g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    setTimeout(()=>oscs.forEach(o=>{try{o.stop()}catch(e){}},700));return noop;
  }
  const o=ctx.createOscillator();o.type='sine';o.frequency.value=midiToFreq(m);o.connect(g);o.start(t);
  g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
  setTimeout(()=>{try{o.stop()}catch(e){}},80);return noop;
}

const CATALOG=[
  {id:'piano',name:'Piano'},{id:'epiano',name:'E.Piano'},{id:'strings',name:'Strings'},
  {id:'drums',name:'Drums'},{id:'bass',name:'Bass'},{id:'organ',name:'Organ'},
  {id:'lead',name:'Lead'},{id:'flute',name:'Flute'},
];
const FN_MAP={piano:mkPiano,epiano:mkEPiano,strings:mkStrings,drums:mkDrums,bass:mkBass,organ:mkOrgan,lead:mkLead,flute:mkFlute};
const NAME_MAP={};

CATALOG.forEach(({id,name})=>{
  NAME_MAP[id]=name;
  const row=document.createElement('button');
  row.type='button';row.className='s-row';row.dataset.id=id;
  if(id==='piano')row.classList.add('sel');
  row.textContent=name;
  row.addEventListener('click',()=>{selectSound(id);closePanel();});
  soundPanel.appendChild(row);
});

function selectSound(id){
  currentSoundId=id;
  soundPickName.textContent=NAME_MAP[id].toUpperCase();
  document.querySelectorAll('.s-row').forEach(r=>r.classList.toggle('sel',r.dataset.id===id));
}
function closePanel(){soundPanel.classList.remove('open');}
soundPickBtn.addEventListener('click',e=>{
  e.stopPropagation();
  const rect=soundPickBtn.getBoundingClientRect();
  soundPanel.style.right=(window.innerWidth-rect.right)+'px';
  soundPanel.style.top=(rect.bottom+4)+'px';
  soundPanel.classList.toggle('open');
});
document.addEventListener('click',closePanel);
soundPanel.addEventListener('click',e=>e.stopPropagation());

function playNote(m){
  if(!soundEnabled)return;
  stopNote(m);
  const ctx=getCtx(),t=ctx.currentTime+0.005;
  activeNodes[m]={stopFn:FN_MAP[currentSoundId](ctx,midiToFreq(m),t,m)};
}
function stopNote(m){
  const n=activeNodes[m];if(!n)return;
  try{n.stopFn();}catch(e){}
  delete activeNodes[m];
}
function setSoundEnabled(v){
  soundEnabled=v;
  soundButton.classList.toggle('active',v);
  soundButton.setAttribute('aria-pressed',String(v));
  if(!v)Object.keys(activeNodes).forEach(m=>stopNote(Number(m)));
}
soundButton.addEventListener('click',()=>setSoundEnabled(!soundEnabled));
function setKeyShapeTall(v){
  piano.classList.toggle('tall',v);
  keyShapeButton.classList.toggle('active',v);
  keyShapeButton.setAttribute('aria-pressed',String(v));
}
keyShapeButton.addEventListener('click',()=>setKeyShapeTall(!piano.classList.contains('tall')));

function baseClass(m){return IS_BLACK[m%12]?'black':'white';}
function renderKeyState(m){
  const el=keyEls[m];if(!el)return;
  el.className=baseClass(m);
  if(clickHeld.has(m)||midiHeld.has(m)||midiSustained.has(m)||(sustainEnabled&&pedalSustained.has(m)))el.classList.add('active');
}
function noteOn(m,fromMidi=false){
  if(m<MMIN||m>MMAX)return;
  const wasOn=clickHeld.has(m)||midiHeld.has(m)||midiSustained.has(m);
  if(fromMidi){midiSustained.delete(m);midiHeld.add(m);}else clickHeld.add(m);
  renderKeyState(m);
  if(!wasOn)playNote(m);
}
function noteOff(m,fromMidi=false){
  if(fromMidi){
    midiHeld.delete(m);
    if(pedalDown){pedalSustained.add(m);if(sustainEnabled)midiSustained.add(m);}
    else{pedalSustained.delete(m);midiSustained.delete(m);if(!clickHeld.has(m))stopNote(m);}
  }else{
    clickHeld.delete(m);
    if(!midiHeld.has(m)&&!pedalSustained.has(m))stopNote(m);
  }
  renderKeyState(m);
}
function releaseSustainedNotes(){
  const ps=[...pedalSustained];pedalSustained.clear();
  ps.forEach(m=>{if(!clickHeld.has(m)&&!midiHeld.has(m))stopNote(m);});
  const ms=[...midiSustained];midiSustained.clear();
  ms.forEach(m=>renderKeyState(m));
}
function setSustainEnabled(v){
  sustainEnabled=v;
  sustainButton.classList.toggle('active',v);
  sustainButton.setAttribute('aria-pressed',String(v));
  if(!v){const ms=[...midiSustained];midiSustained.clear();ms.forEach(m=>renderKeyState(m));}
}
function setPedal(v){
  const next=v>=64;if(pedalDown===next)return;
  pedalDown=next;
  if(!pedalDown)releaseSustainedNotes();
}
sustainButton.addEventListener('click',()=>setSustainEnabled(!sustainEnabled));

let pointerMidiMap={},pointerStartY={},pointerDragging={},pointerDragAnchorY={},pointerPianoStartTop={};
const DRAG_THRESHOLD=20;
function midiFromPoint(x,y){
  const bl=piano.lastElementChild;
  for(const el of bl.children){const r=el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return Number(el.dataset.midi);}
  for(let m=MMIN;m<=MMAX;m++){if(IS_BLACK[m%12])continue;const el=keyEls[m];if(!el)continue;const r=el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return m;}
  return null;
}
function wirePointer(el,m){
  el.dataset.midi=m;
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();
    piano.setPointerCapture(e.pointerId);
    pointerMidiMap[e.pointerId]=m;
    pointerStartY[e.pointerId]=e.clientY;
    pointerDragging[e.pointerId]=false;
    noteOn(m,false);
  });
}
piano.addEventListener('pointermove',e=>{
  if(!(e.buttons&1))return;
  const pid=e.pointerId;
  if(pointerDragging[pid]){
    const newTop=pointerPianoStartTop[pid]+(e.clientY-pointerDragAnchorY[pid]);
    if(window.applyPianoAbsolute)applyPianoAbsolute(newTop);
    return;
  }
  const dy=Math.abs(e.clientY-(pointerStartY[pid]||e.clientY));
  if(dy>DRAG_THRESHOLD){
    pointerDragging[pid]=true;
    pointerDragAnchorY[pid]=e.clientY;
    pointerPianoStartTop[pid]=document.querySelector('.piano-wrap').getBoundingClientRect().top;
    const prev=pointerMidiMap[pid];
    if(prev!==undefined)noteOff(prev,false);
    return;
  }
  const prev=pointerMidiMap[pid];if(prev===undefined)return;
  const next=midiFromPoint(e.clientX,e.clientY);if(next===null||next===prev)return;
  noteOff(prev,false);pointerMidiMap[pid]=next;noteOn(next,false);
});
function cleanPointer(e){
  const pid=e.pointerId;
  if(!pointerDragging[pid]){const m=pointerMidiMap[pid];if(m!==undefined)noteOff(m,false);}
  delete pointerMidiMap[pid];delete pointerStartY[pid];delete pointerDragging[pid];delete pointerDragAnchorY[pid];delete pointerPianoStartTop[pid];
}
piano.addEventListener('pointerup',cleanPointer);
piano.addEventListener('pointercancel',cleanPointer);

function buildPiano(){
  const blackLayer=document.createElement('div');
  blackLayer.style.cssText='position:absolute;inset:0;pointer-events:none;';
  let wc=0;
  for(let m=MMIN;m<=MMAX;m++)if(!IS_BLACK[m%12])wc++;
  const ww=100/wc,wl={};let idx=0;
  for(let m=MMIN;m<=MMAX;m++){
    if(IS_BLACK[m%12])continue;
    const el=document.createElement('div');el.className='white';
    if(idx===0)el.classList.add('first-white');
    el.style.left=`${idx*ww}%`;el.style.width=`${ww}%`;
    wirePointer(el,m);piano.appendChild(el);keyEls[m]=el;wl[m]=idx*ww;idx++;
  }
  for(let m=MMIN;m<=MMAX;m++){
    if(!IS_BLACK[m%12])continue;
    let prev=m-1;while(IS_BLACK[prev%12])prev--;
    const el=document.createElement('div');el.className='black';
    el.style.left=`${wl[prev]+ww}%`;el.style.width=`${ww*0.6}%`;
    el.style.transform=`translateX(${BLACK_TRANSLATE[m%12]}%)`;
    el.style.pointerEvents='auto';
    wirePointer(el,m);blackLayer.appendChild(el);keyEls[m]=el;
  }
  piano.appendChild(blackLayer);
}

function bindMidiInput(input){
  input.onmidimessage=({data})=>{
    const[status,d1,d2]=data,type=status&0xf0;
    if(type===0x90&&d2>0)noteOn(d1,true);
    else if(type===0x80||(type===0x90&&d2===0))noteOff(d1,true);
    else if(type===0xb0&&d1===64)setPedal(d2);
  };
}
async function initMidiAccess(){
  if(midiInitStarted)return null;midiInitStarted=true;
  try{
    const access=await navigator.requestMIDIAccess();
    for(const input of access.inputs.values())bindMidiInput(input);
    access.onstatechange=({port})=>{
      if(port.type==='input'&&port.state==='connected')bindMidiInput(port);
      updateMidiWinNotice(access);
    };
    return access;
  }catch(e){midiInitStarted=false;return null;}
}
function updateMidiWinNotice(access){
  const winNotice=document.getElementById('midiWinNotice');
  const isWin=navigator.userAgentData?navigator.userAgentData.platform==='Windows':/Win/.test(navigator.platform);
  const hasInput=access&&access.inputs.size>0;
  if(isWin&&!hasInput)winNotice.classList.add('visible');
  else winNotice.classList.remove('visible');
}

const helpBtn=document.getElementById('helpBtn');
const helpPanel=document.getElementById('helpPanel');
helpBtn.addEventListener('click',e=>{
  e.stopPropagation();
  const isOpen=helpPanel.classList.contains('open');
  if(isOpen){helpPanel.classList.remove('open');return;}
  const r=helpBtn.getBoundingClientRect();
  helpPanel.style.right=(window.innerWidth-r.left+6)+'px';
  helpPanel.style.left='auto';
  const wrap2=document.querySelector('.piano-wrap');
  const isBelow=wrap2.classList.contains('controls-below');
  const pianoTop=window.getPianoTop();
  const pianoBottom=pianoTop+wrap2.offsetHeight;
  const ph=200,vh=window.innerHeight;
  helpPanel.classList.add('open');
  if(isBelow){
    helpPanel.style.top=Math.min(pianoBottom+4,vh-ph-4)+'px';
    helpPanel.style.bottom='auto';
  }else{
    helpPanel.style.top='auto';
    helpPanel.style.bottom=Math.min(vh-pianoTop+4,vh-ph-4)+'px';
  }
});
document.addEventListener('click',()=>helpPanel.classList.remove('open'));
document.addEventListener('keydown',e=>{if(e.key==='Escape')helpPanel.classList.remove('open');});

buildPiano();
if(!navigator.requestMIDIAccess)document.getElementById('midiNotice').classList.add('visible');
else{
  initMidiAccess().then(updateMidiWinNotice);
  document.getElementById('midiWinNoticeClose').addEventListener('click',e=>{
    e.stopPropagation();
    document.getElementById('midiWinNotice').classList.remove('visible');
  });
}

(function(){
  const wrap=document.querySelector('.piano-wrap');
  let offsetY=null;
  function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
  function getDefaultTop(){
    return wrap.getBoundingClientRect().top;
  }
  function applyOffset(v){
    const clamped=clamp(v,0,Math.max(0,window.innerHeight-wrap.offsetHeight));
    wrap.style.setProperty('--pw-top',clamped+'px');
    offsetY=clamped;
    wrap.classList.toggle('controls-below',clamped<100);
  }
  window.applyPianoAbsolute=function(top){applyOffset(top);};
  window.getPianoTop=function(){return offsetY!==null?offsetY:wrap.getBoundingClientRect().top;};
  document.addEventListener('mouseenter',function(){window.focus();},true);
  let lastWasZoom=false;
  window.addEventListener('wheel',function(e){
    e.preventDefault();
    if(offsetY===null)offsetY=getDefaultTop();
    if(e.shiftKey){
      lastWasZoom=true;
      const vw=window.innerWidth;
      const delta=e.deltaMode===1?e.deltaY*30:e.deltaMode===2?e.deltaY*300:e.deltaY;
      const s=Math.min(4,Math.max(1,curScale*Math.pow(0.999,-delta)));
      const mx=e.clientX;
      const r=wrap.getBoundingClientRect();
      const frac=(mx-r.left)/r.width;
      const tx=mx-frac*s*vw-(vw-s*vw)/2;
      applyScale(s,tx);
    }else{
      if(lastWasZoom){offsetY=wrap.getBoundingClientRect().top;lastWasZoom=false;}
      applyOffset(offsetY-e.deltaY);
    }
  },{passive:false});
  // 1-finger drag: position
  const appEl=document.querySelector('.app');
  let tStartY=null,tOffsetStart=null;
  appEl.addEventListener('touchstart',function(e){
    if(e.touches.length!==1||piano.contains(e.target))return;
    tStartY=e.touches[0].clientY;
    tOffsetStart=offsetY!==null?offsetY:getDefaultTop();
  },{passive:false});
  appEl.addEventListener('touchmove',function(e){
    if(e.touches.length!==1||tStartY===null)return;
    e.preventDefault();
    applyOffset(tOffsetStart+(e.touches[0].clientY-tStartY));
  },{passive:false});
  appEl.addEventListener('touchend',function(){tStartY=null;},{passive:true});

  // 2-finger pinch: scale with origin at pinch center
  let pinchDist0=null,pinchScale0=1,pinchCx=0,pinchFrac=0,curScale=1,curTx=0;
  function dist2(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
  function applyScale(s,tx){
    curScale=Math.min(4,Math.max(1,s));
    const vw=window.innerWidth,half=(curScale-1)*vw/2;
    curTx=Math.min(half,Math.max(-half,tx));
    wrap.style.setProperty('--pw-scale',curScale);
    wrap.style.setProperty('--pw-tx',curTx+'px');
  }
  document.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      tStartY=null;
      pinchDist0=dist2(e.touches);
      pinchScale0=curScale;
      pinchCx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const r=wrap.getBoundingClientRect();
      pinchFrac=(pinchCx-r.left)/r.width;
    }
  },{passive:false});
  document.addEventListener('touchmove',function(e){
    if(e.touches.length===2&&pinchDist0){
      e.preventDefault();
      const vw=window.innerWidth;
      const s=Math.min(4,Math.max(1,pinchScale0*(dist2(e.touches)/pinchDist0)));
      const tx=pinchCx-pinchFrac*s*vw-(vw-s*vw)/2;
      applyScale(s,tx);
    }
  },{passive:false});
  document.addEventListener('touchend',function(e){
    if(e.touches.length<2)pinchDist0=null;
  },{passive:true});
})();
</script>
