<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lhim Keys</title>
<meta name="application-name" content="Lhim Keys">
<meta name="apple-mobile-web-app-title" content="Lhim Keys">
<meta property="og:title" content="Lhim Keys">
<meta name="twitter:title" content="Lhim Keys">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
:root{
  --bg:#ffffff;
  --text:#121826;
  --accent:#121826;
  --active:#fbbf24;
  --control-top-between-middle-bottom:calc(75vh - 2.644vw);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.app.pos-top{justify-content:flex-start}
.app.pos-middle{justify-content:center}
.app.pos-bottom{justify-content:flex-end}
.position-control{
  position:fixed;
  right:14px;
  top:clamp(120px,var(--control-top-between-middle-bottom),calc(100vh - 120px));
  transform:translateY(-50%);
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.position-control button{
  appearance:none;
  width:14px;
  height:14px;
  padding:0;
  border:1px solid #b9c0c8;
  border-radius:999px;
  background:#fff;
  cursor:pointer;
}
.position-control button.on{
  background:var(--accent);
  border-color:var(--accent);
}
.position-control span,
.social-link span{
  position:absolute;
  width:1px;
  height:1px;
  overflow:hidden;
  clip:rect(0 0 0 0);
  white-space:nowrap;
}
.social-link{
  width:20px;
  height:20px;
  margin-top:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#121826;
  opacity:.72;
  transition:opacity .15s ease;
}
.position-control .social-link:first-of-type{margin-top:6px}
.social-link:hover{opacity:1}
.social-link svg{
  display:block;
  width:20px;
  height:20px;
}
.piano-wrap{
  width:100%;
  background:#fff;
}
.piano-shell{
  margin:0;
  padding:0;
  background:#fff;
}
.piano{
  position:relative;
  width:100%;
  aspect-ratio:52 / 5.5;
  overflow:hidden;
  background:#fff;
}
.piano::before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:1px;
  background:#1e293b;
  z-index:5;
  pointer-events:none;
}
.white,.black{
  position:absolute;
  user-select:none;
  touch-action:none;
  transition:background .06s ease;
}
.white{
  background:#fff;
  border-top:1px solid #1e293b;
  border-right:1px solid #1e293b;
  border-bottom:1px solid #1e293b;
  height:100%;
}
.white.first-white{border-left:1px solid #1e293b}
.black{
  z-index:2;
  background:#1e293b;
  border:1px solid #1e293b;
  border-top:none;
  height:65%;
}
.white.active,.black.active{
  background:var(--active) !important;
  box-shadow:none !important;
}
@media (max-width: 720px){
  .position-control{right:10px;gap:7px}
  .position-control button{width:13px;height:13px}
  .social-link,.social-link svg{width:18px;height:18px}
}
</style>
</head>
<body>
<div class="app pos-bottom" id="app">
  <div class="position-control" aria-label="건반 위치">
    <button type="button" data-position="top" title="상단"><span>상단</span></button>
    <button type="button" data-position="middle" title="중단"><span>중단</span></button>
    <button type="button" data-position="bottom" title="기본 위치"><span>기본 위치</span></button>
    <a class="social-link" href="https://www.instagram.com/lhimmusic" target="_blank" rel="noopener noreferrer" title="Instagram">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="4" y="4" width="16" height="16" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="17" cy="7" r="1.2" fill="currentColor"/>
      </svg>
      <span>Instagram</span>
    </a>
    <a class="social-link" href="https://www.youtube.com/@lhimhuh" target="_blank" rel="noopener noreferrer" title="YouTube">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 8.2a3 3 0 0 0-2.1-2.1C17.1 5.6 12 5.6 12 5.6s-5.1 0-6.9.5A3 3 0 0 0 3 8.2a31 31 0 0 0 0 7.6 3 3 0 0 0 2.1 2.1c1.8.5 6.9.5 6.9.5s5.1 0 6.9-.5a3 3 0 0 0 2.1-2.1 31 31 0 0 0 0-7.6Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="m10 9 5 3-5 3V9Z" fill="currentColor"/>
      </svg>
      <span>YouTube</span>
    </a>
  </div>
  <div class="piano-wrap">
    <div class="piano-shell">
      <div class="piano" id="piano"></div>
    </div>
  </div>
</div>

<script>
const MMIN = 21;
const MMAX = 108;
const IS_BLACK = [0,1,0,1,0,0,1,0,1,0,1,0].map(Boolean);
const BLACK_TRANSLATE = {1:-67,3:-33,6:-72,8:-50,10:-28};

const app = document.getElementById("app");
const piano = document.getElementById("piano");
const positionButtons = [...document.querySelectorAll("[data-position]")];

let keyEls = {};
let clickHeld = new Set();
let midiHeld = new Set();
let midiSustained = new Set();
let pedalDown = false;
let midiInitStarted = false;

function baseClass(midi){
  return IS_BLACK[midi % 12] ? "black" : "white";
}

function renderKeyState(midi){
  const el = keyEls[midi];
  if(!el) return;
  el.className = baseClass(midi);
  if(clickHeld.has(midi) || midiHeld.has(midi) || midiSustained.has(midi)){
    el.classList.add("active");
  }
}

function noteOn(midi, fromMidi = false){
  if(midi < MMIN || midi > MMAX) return;
  if(fromMidi){
    midiSustained.delete(midi);
    midiHeld.add(midi);
  }
  else clickHeld.add(midi);
  renderKeyState(midi);
}

function noteOff(midi, fromMidi = false){
  if(fromMidi){
    midiHeld.delete(midi);
    if(pedalDown) midiSustained.add(midi);
    else midiSustained.delete(midi);
  }
  else clickHeld.delete(midi);
  renderKeyState(midi);
}

function setPedal(value){
  const nextPedalDown = value >= 64;
  if(pedalDown === nextPedalDown) return;
  pedalDown = nextPedalDown;
  if(pedalDown) return;
  const released = [...midiSustained];
  midiSustained.clear();
  released.forEach(renderKeyState);
}

function buildPiano(){
  const blackLayer = document.createElement("div");
  blackLayer.style.cssText = "position:absolute;inset:0;pointer-events:none;";
  let whiteCount = 0;
  for(let midi = MMIN; midi <= MMAX; midi++) if(!IS_BLACK[midi % 12]) whiteCount++;
  const whiteWidth = 100 / whiteCount;
  const whiteLeft = {};
  let index = 0;

  for(let midi = MMIN; midi <= MMAX; midi++){
    if(IS_BLACK[midi % 12]) continue;
    const el = document.createElement("div");
    el.className = "white";
    if(index === 0) el.classList.add("first-white");
    el.style.left = `${index * whiteWidth}%`;
    el.style.width = `${whiteWidth}%`;
    wirePointer(el, midi);
    piano.appendChild(el);
    keyEls[midi] = el;
    whiteLeft[midi] = index * whiteWidth;
    index++;
  }

  for(let midi = MMIN; midi <= MMAX; midi++){
    if(!IS_BLACK[midi % 12]) continue;
    let prev = midi - 1;
    while(IS_BLACK[prev % 12]) prev--;
    const el = document.createElement("div");
    el.className = "black";
    el.style.left = `${whiteLeft[prev] + whiteWidth}%`;
    el.style.width = `${whiteWidth * 0.6}%`;
    el.style.transform = `translateX(${BLACK_TRANSLATE[midi % 12]}%)`;
    el.style.pointerEvents = "auto";
    wirePointer(el, midi);
    blackLayer.appendChild(el);
    keyEls[midi] = el;
  }

  piano.appendChild(blackLayer);
}

function wirePointer(el, midi){
  el.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    initMidiAccess();
    el.setPointerCapture?.(event.pointerId);
    noteOn(midi, false);
  });
  el.addEventListener("pointerup", () => noteOff(midi, false));
  el.addEventListener("pointercancel", () => noteOff(midi, false));
  el.addEventListener("pointerleave", () => noteOff(midi, false));
}

async function initMidiAccess(){
  if(midiInitStarted || !navigator.requestMIDIAccess) {
    return;
  }
  midiInitStarted = true;
  try{
    const access = await navigator.requestMIDIAccess();
    const inputs = [...access.inputs.values()];
    if(!inputs.length){
      return;
    }
    for(const input of inputs){
      input.onmidimessage = ({data}) => {
        const [status, d1, d2] = data;
        const type = status & 0xf0;
        if(type === 0x90 && d2 > 0) noteOn(d1, true);
        else if(type === 0x80 || (type === 0x90 && d2 === 0)) noteOff(d1, true);
        else if(type === 0xb0 && d1 === 64) setPedal(d2);
      };
    }
  }catch(error){
    midiInitStarted = false;
  }
}

function setKeyboardPosition(position){
  app.classList.remove("pos-top","pos-middle","pos-bottom");
  app.classList.add(`pos-${position}`);
  positionButtons.forEach((button) => {
    button.classList.toggle("on", button.dataset.position === position);
  });
}

positionButtons.forEach((button) => {
  button.addEventListener("click", () => setKeyboardPosition(button.dataset.position));
});

document.addEventListener("pointerdown", () => {
  initMidiAccess();
}, {once:true});

buildPiano();
setKeyboardPosition("bottom");
initMidiAccess();
</script>
</body>
</html>
