<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lhim Keys</title>
<link rel="icon" href="favicon.ico">
<style>
:root{--bg:#ffffff;--text:#121826;--accent:#121826;--active:#fbbf24}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.midi-notice{display:none;width:100%;background:#fef3c7;border-bottom:1px solid #f59e0b;color:#92400e;font:500 11px/1.4 system-ui,sans-serif;text-align:center;padding:7px 16px;box-sizing:border-box}
.midi-notice.visible{display:block}
.sustain-button{position:absolute;right:18px;bottom:calc(100% + 10px);z-index:10;appearance:none;display:flex;align-items:center;gap:2px;min-width:106px;border:1px solid #cbd5e1;border-radius:999px;background:#fff;color:#1e293b;padding:5px 7px 5px 8px;font:700 10px/1 system-ui,sans-serif;letter-spacing:0;cursor:pointer;user-select:none}
.sustain-button.active{border-color:#1e293b}
.sustain-label{width:72px;text-align:left;white-space:nowrap}
.sustain-switch{position:relative;width:26px;height:14px;flex:0 0 auto;border-radius:999px;background:#cbd5e1;transition:background .12s ease}
.sustain-switch::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.25);transition:transform .12s ease}
.sustain-button.active .sustain-switch{background:#1e293b}
.sustain-button.active .sustain-switch::after{transform:translateX(12px)}
.piano-wrap{position:relative;width:100%;background:#fff}
.piano-shell{margin:0;padding:0;background:#fff}
.piano{position:relative;width:100%;aspect-ratio:52/5.5;overflow:hidden;background:#fff}
.piano::before{content:"";position:absolute;inset:0 0 auto 0;height:1px;background:#1e293b;z-index:5;pointer-events:none}
.white,.black{position:absolute;user-select:none;touch-action:none;transition:background .06s ease}
.white{background:#fff;border-top:1px solid #1e293b;border-right:1px solid #1e293b;border-bottom:1px solid #1e293b;height:100%}
.white.first-white{border-left:1px solid #1e293b}
.black{z-index:2;background:#1e293b;border:1px solid #1e293b;border-top:none;height:65%}
.white.active,.black.active{background:var(--active)!important;box-shadow:none!important}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="midi-notice" id="midiNotice">이 브라우저는 MIDI를 지원하지 않습니다. MIDI 기기를 연결하려면 Chrome을 사용해 주세요.</div>
  <div class="piano-wrap">
    <button class="sustain-button" id="sustainButton" type="button" aria-pressed="false">
      <span class="sustain-label" id="sustainLabel">SUSTAIN OFF</span>
      <span class="sustain-switch" aria-hidden="true"></span>
    </button>
    <div class="piano-shell">
      <div class="piano" id="piano"></div>
    </div>
  </div>
</div>
<script>
const MMIN=21,MMAX=108;
const IS_BLACK=[0,1,0,1,0,0,1,0,1,0,1,0].map(Boolean);
// 검은 건반 위치 보정값 (단위: 흰 건반 너비 기준 %)
// 음정 클래스(midi%12): 1=C#, 3=D#, 6=F#, 8=G#, 10=A#
const BLACK_TRANSLATE={1:-67,3:-33,6:-72,8:-50,10:-28};
const piano=document.getElementById("piano");
const sustainButton=document.getElementById("sustainButton");
const sustainLabel=document.getElementById("sustainLabel");
let keyEls={},clickHeld=new Set(),midiHeld=new Set(),midiSustained=new Set();
let pedalDown=false,sustainEnabled=false,midiInitStarted=false;

function baseClass(m){return IS_BLACK[m%12]?"black":"white"}
function renderKeyState(m){
  const el=keyEls[m];if(!el)return;
  el.className=baseClass(m);
  if(clickHeld.has(m)||midiHeld.has(m)||midiSustained.has(m))el.classList.add("active");
}
function noteOn(m,fromMidi=false){
  if(m<MMIN||m>MMAX)return;
  if(fromMidi){midiSustained.delete(m);midiHeld.add(m);}
  else clickHeld.add(m);
  renderKeyState(m);
}
function noteOff(m,fromMidi=false){
  if(fromMidi){
    midiHeld.delete(m);
    if(sustainEnabled&&pedalDown)midiSustained.add(m);
    else midiSustained.delete(m);
  }else clickHeld.delete(m);
  renderKeyState(m);
}
function releaseSustainedNotes(){
  const r=[...midiSustained];midiSustained.clear();r.forEach(renderKeyState);
}
function setSustainEnabled(v){
  sustainEnabled=v;
  sustainButton.classList.toggle("active",v);
  sustainButton.setAttribute("aria-pressed",String(v));
  sustainLabel.textContent=v?"SUSTAIN ON":"SUSTAIN OFF";
  if(!v)releaseSustainedNotes();
}
function setPedal(v){
  const next=v>=64;if(pedalDown===next)return;
  pedalDown=next;
  if(!sustainEnabled||pedalDown)return;
  releaseSustainedNotes();
}
sustainButton.addEventListener("click",()=>setSustainEnabled(!sustainEnabled));

function buildPiano(){
  const blackLayer=document.createElement("div");
  blackLayer.style.cssText="position:absolute;inset:0;pointer-events:none;";
  let wc=0;
  for(let m=MMIN;m<=MMAX;m++)if(!IS_BLACK[m%12])wc++;
  const ww=100/wc,wl={};let idx=0;
  for(let m=MMIN;m<=MMAX;m++){
    if(IS_BLACK[m%12])continue;
    const el=document.createElement("div");
    el.className="white";
    if(idx===0)el.classList.add("first-white");
    el.style.left=`${idx*ww}%`;el.style.width=`${ww}%`;
    wirePointer(el,m);piano.appendChild(el);
    keyEls[m]=el;wl[m]=idx*ww;idx++;
  }
  for(let m=MMIN;m<=MMAX;m++){
    if(!IS_BLACK[m%12])continue;
    let prev=m-1;while(IS_BLACK[prev%12])prev--;
    const el=document.createElement("div");
    el.className="black";
    el.style.left=`${wl[prev]+ww}%`;
    el.style.width=`${ww*0.6}%`;
    el.style.transform=`translateX(${BLACK_TRANSLATE[m%12]}%)`;
    el.style.pointerEvents="auto";
    wirePointer(el,m);blackLayer.appendChild(el);keyEls[m]=el;
  }
  piano.appendChild(blackLayer);
}
function wirePointer(el,m){
  el.addEventListener("pointerdown",e=>{e.preventDefault();el.setPointerCapture(e.pointerId);noteOn(m,false);});
  el.addEventListener("pointerup",()=>noteOff(m,false));
  el.addEventListener("pointercancel",()=>noteOff(m,false));
}
async function initMidiAccess(){
  if(midiInitStarted)return;
  midiInitStarted=true;
  try{
    const access=await navigator.requestMIDIAccess();
    const inputs=[...access.inputs.values()];
    if(!inputs.length)return;
    for(const input of inputs){
      input.onmidimessage=({data})=>{
        const[status,d1,d2]=data,type=status&0xf0;
        if(type===0x90&&d2>0)noteOn(d1,true);
        else if(type===0x80||(type===0x90&&d2===0))noteOff(d1,true);
        else if(type===0xb0&&d1===64)setPedal(d2);
      };
    }
  }catch(e){midiInitStarted=false;}
}

buildPiano();
if(!navigator.requestMIDIAccess){
  document.getElementById("midiNotice").classList.add("visible");
}else{
  initMidiAccess();
}
</script>
</body>
</html>
